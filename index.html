<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Đặc Biệt 8/3</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        #start-screen {
            position: relative;
            z-index: 100;
            text-align: center;
        }
        .btn-start {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-start:hover { background: var(--pink-dark); }

        #text-sequence {
            display: none;
            position: relative;
            z-index: 50;
            font-size: 1.8rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 10px var(--pink-dark);
        }

        /* --- HIỆU ỨNG ẢNH NỀN MỚI --- */
        #photo-slider-bg {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            overflow: hidden;
            display: flex;
            justify-content: center;
            gap: 15px; /* Khoảng cách giữa các cột */
            opacity: 0.5; /* Độ mờ để làm nổi bật nút bấm */
        }

        .photo-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Animation sẽ được gán ngẫu nhiên bằng JS */
        }

        @keyframes scrollDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0%); }
        }

        .slider-img {
            width: 180px; /* Tăng kích thước ảnh */
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* --------------------------- */

        #main-content {
            display: none;
            position: relative;
            z-index: 20;
            flex-direction: column;
            align-items: center;
        }

        .btn-open-gift {
            padding: 20px 50px;
            background: var(--pink-dark);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 0 30px var(--pink-dark);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .gift-box {
            background: #1a1a1a;
            padding: 30px;
            border: 2px solid var(--pink-dark);
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
        }

        .fade-in { animation: fadeIn 1s forwards; }
        .fade-out { animation: fadeOut 1s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Bấm vào đây nè ✨</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-slider-bg"></div>

    <div id="main-content">
        <button class="btn-open-gift" onclick="showFinalGift()">Mở Quà Cho Cậu 🎁</button>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="gift-box">
            <h2 style="color: var(--pink-dark)">Happy Women's Day!</h2>
            <p>Tớ hy vọng món quà nhỏ này làm cậu mỉm cười. Chúc cậu một ngày 8/3 thật ý nghĩa và trọn vẹn nhé! ❤️</p>
            <small>(Bấm để đóng)</small>
        </div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ trước màn hình...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ chúc cậu luôn xinh đẹp, rạng rỡ",
            "Và luôn hạnh phúc với những gì mình chọn!",
            "Đây là một chút kỷ niệm dành cho cậu..."
        ];

        // LINK ẢNH (Nên để ít nhất 10-15 ảnh để hiệu ứng mượt hơn)
        const myImages = [
            'https://picsum.photos/400/600?random=1',
            'https://picsum.photos/400/600?random=2',
            'https://picsum.photos/400/600?random=3',
            'https://picsum.photos/400/600?random=4',
            'https://picsum.photos/400/600?random=5',
            'https://picsum.photos/400/600?random=6',
            'https://picsum.photos/400/600?random=7',
            'https://picsum.photos/400/600?random=8'
        ];

        let currentPhrase = 0;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.classList.remove('fade-out');
                textEl.classList.add('fade-in');

                setTimeout(() => {
                    textEl.classList.remove('fade-in');
                    textEl.classList.add('fade-out');
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 1000);
                }, 2500);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            const bg = document.getElementById('photo-slider-bg');
            bg.style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            populateSlider();
        }

        function populateSlider() {
            const container = document.getElementById('photo-slider-bg');
            // Tính số lượng cột dựa trên chiều rộng màn hình
            const columnCount = Math.ceil(window.innerWidth / 180) + 1; 

            for (let i = 0; i < columnCount; i++) {
                const col = document.createElement('div');
                col.className = 'photo-column';
                
                // Gán tốc độ ngẫu nhiên từ 15s đến 30s
                const duration = Math.random() * 15 + 15;
                // Gán độ trễ ngẫu nhiên để các cột không chạy cùng lúc
                const delay = Math.random() * -20; 
                col.style.animation = `scrollDown ${duration}s linear infinite`;
                col.style.animationDelay = `${delay}s`;

                // Trộn ảnh ngẫu nhiên cho mỗi cột
                const shuffledImages = [...myImages].sort(() => 0.5 - Math.random());
                const tripleImages = [...shuffledImages, ...shuffledImages, ...shuffledImages];

                tripleImages.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'slider-img';
                    col.appendChild(img);
                });
                container.appendChild(col);
            }
        }

        function showFinalGift() {
            document.getElementById('overlay').style.display = 'flex';
        }

        // Vẽ sao nền
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx
