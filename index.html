<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà 8/3 Đặc Biệt</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
            --book-cover: #d4145a;
            --paper-bg: #fffef0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 1. Màn hình bắt đầu */
        #start-screen {
            position: relative;
            z-index: 100;
            text-align: center;
        }
        .btn-start {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 1.1rem;
        }

        /* 2. Chuỗi chữ biến đổi */
        #text-sequence {
            display: none;
            position: relative;
            z-index: 50;
            font-size: 1.8rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 10px var(--pink-dark);
        }

        /* 3. Ảnh trôi tự do ngẫu nhiên */
        #photo-float-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .floating-img {
            position: absolute;
            width: 180px;
            border-radius: 12px;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0.5;
            animation: floatDown linear infinite;
        }
        @keyframes floatDown {
            from { transform: translateY(-110vh) rotate(var(--rot)); }
            to { transform: translateY(110vh) rotate(var(--rot)); }
        }

        /* 4. PHẦN THIỆP QUYỂN VỞ NÂNG CẤP */
        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            perspective: 2000px; /* Tạo độ sâu 3D */
        }

        .book {
            position: relative;
            width: 320px;
            height: 440px;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        /* Lớp bìa trước */
        .book-cover {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--book-cover) 0%, #8e0e3a 100%);
            border-radius: 5px 15px 15px 5px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            transform-origin: left;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 20;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 10px solid #6b0a2d; /* Gáy vở dày */
        }

        /* Lớp trang giấy bên trong */
        .book-page {
            position: absolute;
            width: 96%; height: 96%;
            top: 2%; left: 2%;
            background: var(--paper-bg);
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 100% 30px; /* Dòng kẻ vở */
            border-radius: 0 10px 10px 0;
            z-index: 10;
            padding: 40px 25px;
            box-sizing: border-box;
            color: #333;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.1);
        }

        /* Đường kẻ lề đỏ trang vở */
        .book-page::before {
            content: '';
            position: absolute;
            top: 0; left: 35px;
            width: 2px; height: 100%;
            background: rgba(255, 0, 0, 0.2);
        }

        /* Khi mở quyển vở */
        .book.open .book-cover {
            transform: rotateY(-160deg);
        }

        .book-cover h2 { font-size: 1.8rem; margin: 15px 0; font-family: serif; letter-spacing: 2px; }
        .book-cover .icon { font-size: 4rem; animation: pulse 1.5s infinite; }

        #typing-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 30px; /* Khớp với dòng kẻ */
            font-weight: bold;
            color: #2c3e50;
        }

        #typing-text::after { content: '|'; animation: blink 0.7s infinite; color: var(--pink-dark); }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .hint {
            position: absolute;
            bottom: -60px; width: 100%;
            text-align: center;
            color: var(--pink-light);
            font-style: italic;
            font-size: 0.9rem;
        }

        .fade-in { animation: fadeIn 1s forwards; }
        .fade-out { animation: fadeOut 1s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Bấm vào đây nè ✨</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-float-container"></div>

    <div id="main-content">
        <div class="book" id="myBook" onclick="toggleBook()">
            <div class="book-cover">
                <div class="icon">🌹</div>
                <h2>Gửi Cậu</h2>
                <small style="opacity: 0.7;">(Chạm để mở trang vở)</small>
            </div>
            <div class="book-page">
                <h3 style="margin-top:0; color: var(--book-cover); font-family: serif;">Gửi bạn xinh xắn,</h3>
                <div id="typing-text"></div>
            </div>
        </div>
        <div class="hint">Hãy lật mở điều bất ngờ bên trong...</div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ trước màn hình...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ chúc cậu luôn xinh đẹp, rạng rỡ",
            "Và luôn hạnh phúc với những gì mình chọn!",
            "Đây là một chút kỷ niệm dành cho cậu..."
        ];

        const fullMessage = "Tớ hy vọng món quà nhỏ này làm cậu mỉm cười. Chúc cậu một ngày 8/3 thật ý nghĩa, hạnh phúc và luôn là bông hoa rạng rỡ nhất nhé! Cảm ơn cậu vì đã luôn tuyệt vời. ❤️";

        // LINK ẢNH CỦA BẠN
        const myImages = [
            'https://picsum.photos/300/450?random=1',
            'https://picsum.photos/300/450?random=2',
            'https://picsum.photos/300/450?random=3',
            'https://picsum.photos/300/450?random=4',
            'https://picsum.photos/300/450?random=5'
        ];

        let currentPhrase = 0;
        let typingStarted = false;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';
                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 1000);
                }, 2500);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            document.getElementById('photo-float-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'flex';
            createFloatingImages();
        }

        function createFloatingImages() {
            const container = document.getElementById('photo-float-container');
            for (let i = 0; i < 25; i++) {
                const img = document.createElement('img');
                img.src = myImages[i % myImages.length];
                img.className = 'floating-img';
                img.style.left = Math.random() * 85 + '%';
                img.style.animationDuration = (15 + Math.random() * 20) + 's';
                img.style.animationDelay = (Math.random() * -30) + 's';
                img.style.setProperty('--rot', (Math.random() - 0.5) * 45 + 'deg');
                img.style.zIndex = Math.floor(Math.random() * 5);
                container
