<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Chúc Mừng 8/3</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
            --card-bg: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 1. Màn hình bắt đầu */
        #start-screen {
            position: relative;
            z-index: 1000;
            text-align: center;
        }
        .btn-start {
            padding: 15px 35px;
            background: rgba(255, 182, 193, 0.2);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        #text-sequence {
            display: none;
            position: relative;
            z-index: 500;
            font-size: 1.8rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 15px var(--pink-dark);
        }

        /* 2. Ảnh trôi ngẫu nhiên */
        #photo-float-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .floating-img {
            position: absolute;
            width: 180px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            opacity: 0.5;
            animation: floatDown linear infinite;
        }
        @keyframes floatDown {
            from { transform: translateY(-110vh) rotate(var(--rot)); }
            to { transform: translateY(110vh) rotate(var(--rot)); }
        }

        /* 3. Cấu trúc Thiệp 3D */
        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            perspective: 1500px;
        }

        .card {
            position: relative;
            width: 300px;
            height: 400px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        /* Khi mở thiệp */
        .card.open {
            transform: rotateY(-130deg);
        }

        .card-front, .card-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .card-front {
            background: var(--pink-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .card-front h2 { margin: 0; font-size: 1.5rem; }
        .card-front .heart { font-size: 4rem; color: white; margin: 20px 0; animation: beat 1s infinite; }

        .card-inside {
            background: var(--card-bg);
            color: #333;
            transform: rotateY(180deg);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-inside h2 { color: var(--pink-dark); margin-top: 0; }
        #typing-text { font-size: 1.1rem; line-height: 1.5; color: #444; }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        #typing-text::after {
            content: '|';
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: var(--pink-light);
            animation: fadeIn 2s infinite;
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Bấm vào đây nè ✨</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-float-container"></div>

    <div id="main-content">
        <div class="card" id="myCard" onclick="openCard()">
            <div class="card-front">
                <h2>Gửi Cậu...</h2>
                <div class="heart">❤️</div>
                <p>Mở thiệp ra đi!</p>
            </div>
            <div class="card-inside">
                <h2>Happy 8/3!</h2>
                <p id="typing-text"></p>
                <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">(Bấm để đóng thiệp)</p>
            </div>
        </div>
        <div class="hint" id="card-hint">Chạm vào thiệp để mở</div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ trước màn hình...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ chúc cậu luôn xinh đẹp, rạng rỡ",
            "Và luôn hạnh phúc với những gì mình chọn!",
            "Đây là một chút kỷ niệm dành cho cậu..."
        ];

        const fullMessage = "Tớ hy vọng món quà nhỏ này làm cậu mỉm cười. Chúc cậu một ngày 8/3 thật ý nghĩa, hạnh phúc và luôn là bông hoa rạng rỡ nhất nhé! ❤️";

        // Thay link ảnh của bạn vào đây
        const myImages = [
            'https://picsum.photos/400/600?random=1',
            'https://picsum.photos/400/600?random=2',
            'https://picsum.photos/400/600?random=3',
            'https://picsum.photos/400/600?random=4',
            'https://picsum.photos/400/600?random=5'
        ];

        let currentPhrase = 0;
        let isTyping = false;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';
                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 800);
                }, 2200);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            document.getElementById('photo-float-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'flex';
            createFloatingImages();
        }

        function createFloatingImages() {
            const container = document.getElementById('photo-float-container');
            for (let i = 0; i < 20; i++) {
                const img = document.createElement('img');
                img.src = myImages[i % myImages.length];
                img.className = 'floating-img';
                img.style.left = Math.random() * 90 + '%';
                img.style.animationDuration = (15 + Math.random() * 20) + 's';
                img.style.animationDelay = (Math.random() * -30) + 's';
                img.style.zIndex = Math.floor(Math.random() * 5);
                img.style.setProperty('--rot', (Math.random() - 0.5) * 40 + 'deg');
                container.appendChild(img);
            }
        }

        function openCard() {
            const card = document.getElementById('myCard');
            const hint = document.getElementById('card-hint');
            
            if (!card.classList.contains('open')) {
                card.classList.add('open');
                hint.style.display = 'none';
                if (!isTyping) {
                    isTyping = true;
                    setTimeout(() => {
                        typeWriter(fullMessage, 0);
                    }, 800);
                }
            } else {
                card.classList.remove('open');
                // Nếu muốn mỗi lần mở là đánh chữ lại thì reset ở đây
                // isTyping = false;
                // document.getElementById("typing-text").innerHTML = "";
            }
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML = text.substring(0, i + 1);
                setTimeout(function() {
                    typeWriter(text, i + 1)
                }, 70);
            }
        }

        // Sao nền
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: 0.3});
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
