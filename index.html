<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Nàng 8/3 ✨</title>
    <style>
        :root {
            --pink-dark: #d4145a;
            --pink-light: #ffb6c1;
            --paper-bg: #fffef0; /* Màu giấy hơi vàng vintage */
            --line-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 1. Màn hình bắt đầu */
        #start-screen {
            position: relative;
            z-index: 1000;
            text-align: center;
        }
        .btn-start {
            padding: 18px 40px;
            background: linear-gradient(45deg, var(--pink-dark), #ff6a00);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(212, 20, 90, 0.4);
            transition: 0.3s;
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 20, 90, 0.6); }

        /* 2. Hiệu ứng ảnh trôi */
        #photo-float-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .floating-img {
            position: absolute;
            width: 160px;
            border-radius: 12px;
            border: 3px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0.6;
            animation: floatDown linear infinite;
        }
        @keyframes floatDown {
            from { transform: translateY(-110vh) rotate(var(--rot)); }
            to { transform: translateY(110vh) rotate(var(--rot)); }
        }

        /* 3. THIỆP QUYỂN VỞ CHỈNH CHU */
        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            perspective: 2000px;
        }

        .book {
            position: relative;
            width: 320px;
            height: 450px;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        /* Bìa vở */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--pink-dark) 0%, #8e0e3a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px 20px 20px 5px;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.6);
            transform-origin: left;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 10;
            cursor: pointer;
            border-left: 8px solid #6b0a2d; /* Gáy vở dày */
        }

        /* Trang trong */
        .page-inside {
            position: absolute;
            width: 98%;
            height: 98%;
            top: 1%; left: 1%;
            background: var(--paper-bg);
            /* Tạo dòng kẻ vở */
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 28px;
            border-radius: 0 15px 15px 0;
            padding: 40px 25px;
            box-sizing: border-box;
            z-index: 5;
            color: #2c3e50;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* Đường kẻ lề đỏ */
        .page-inside::before {
            content: '';
            position: absolute;
            top: 0; left: 40px;
            width: 2px; height: 100%;
            background: rgba(255, 0, 0, 0.2);
        }

        .book.open .cover {
            transform: rotateY(-155deg);
        }

        .cover .decor { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .cover h2 { font-family: 'Georgia', serif; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }

        #typing-text { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.1rem; 
            line-height: 28px; /* Khớp với dòng kẻ */
            font-weight: bold;
            text-align: left;
        }

        #typing-text::after { content: '_'; animation: blink 0.7s infinite; color: var(--pink-dark); }
        @keyframes blink { 50% { opacity: 0; } }

        .hint-text {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0.6;
            font-style: italic;
            font-size: 0.9rem;
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }

    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Gửi tặng người ấy ❤️</button>
    </div>

    <div id="text-sequence" style="display:none;"></div>

    <div id="photo-float-container"></div>

    <div id="main-content">
        <div class="book" id="myBook">
            <div class="cover" onclick="openBook()">
                <div class="decor">🌸</div>
                <h2>For You</h2>
                <p style="font-size: 0.8rem; opacity: 0.8;">Nhấn để lật trang</p>
            </div>
            <div class="page-inside" onclick="openBook()">
                <h3 style="color: var(--pink-dark); margin: 0 0 15px 0; font-family: serif;">Thân gửi cậu,</h3>
                <div id="typing-text"></div>
            </div>
        </div>
        <div class="hint-text">Hãy chạm vào quyển vở để bắt đầu</div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ xinh xắn...",
            "Tớ có một món quà nhỏ muốn tặng cậu",
            "Hy vọng nó sẽ làm ngày của cậu rạng rỡ hơn",
            "Mở quyển vở này ra nhé...",
            "Sẵn sàng chưa? ✨"
        ];

        const fullMessage = "Nhân ngày 8/3, chúc cậu luôn giữ được nụ cười tỏa nắng trên môi. Chúc cậu xinh đẹp như những đóa hoa, mạnh mẽ như những đóa cỏ dại và luôn hạnh phúc với phiên bản tuyệt vời nhất của chính mình. Cảm ơn cậu vì đã luôn tuyệt vời như thế! ❤️";

        // Thay link ảnh của bạn vào đây (nên lấy 5-8 cái khác nhau)
        const myImages = [
            'https://picsum.photos/400/600?random=10',
            'https://picsum.photos/400/600?random=11',
            'https://picsum.photos/400/600?random=12',
            'https://picsum.photos/400/600?random=13',
            'https://picsum.photos/400/600?random=14'
        ];

        let currentPhrase = 0;
        let typingStarted = false;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';
                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 800);
                }, 2500);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            document.getElementById('photo-float-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'flex';
            createFloatingImages();
        }

        function createFloatingImages() {
            const container = document.getElementById('photo-float-container');
            for (let i = 0; i < 25; i++) {
                const img = document.createElement('img');
                img.src = myImages[i % myImages.length];
                img.className = 'floating-img';
                img.style.left = Math.random() * 85 + '%';
                img.style.animationDuration = (15 + Math.random() * 15) + 's';
                img.style.animationDelay = (Math.random() * -30) + 's';
                img.style.setProperty('--rot', (Math.random() - 0.5) * 45 + 'deg');
                container.appendChild(img);
            }
        }

        function openBook() {
            const book = document.getElementById('myBook');
            book.classList.toggle('open');
            
            if (book.classList.contains('open') && !typingStarted) {
                typingStarted = true;
                setTimeout(() => {
                    typeWriter(fullMessage, 0);
                }, 1000);
            }
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1), 70);
            }
        }

        // Sao nền lung linh
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<120; i++) {
                stars.push({
                    x: Math.random()*canvas.width, 
                    y: Math.random()*canvas.height, 
                    s: Math.random()*2, 
                    v: 0.2 + Math.random() * 0.4
                });
            }
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
