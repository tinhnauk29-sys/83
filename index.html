<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Nhỏ - 8/3</title>
    <style>
        :root {
            --pink-main: #ff69b4;
            --pink-glow: #ff1493;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Lớp nền sao rơi - Quan trọng: pointer-events: none để không chặn click */
        #starCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; 
            pointer-events: none; 
        }

        /* Container chính */
        .main-content {
            position: relative;
            z-index: 10; /* Luôn nằm trên cùng */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--pink-main);
            text-shadow: 0 0 15px var(--pink-glow);
            margin-bottom: 10px;
        }

        /* Gallery ảnh mini */
        .photo-space {
            position: relative;
            width: 100%;
            height: 250px;
            margin: 20px 0;
        }

        .floating-img {
            position: absolute;
            width: 70px; height: 90px;
            border: 2px solid white;
            border-radius: 5px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(255,105,180,0.4);
            animation: floatAnim 4s infinite ease-in-out;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Nút bấm xịn xò */
        .btn-gift {
            background: none;
            border: 2px solid var(--pink-main);
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px var(--pink-glow);
            z-index: 100; /* Ưu tiên cực cao */
        }

        .btn-gift:hover {
            background: var(--pink-main);
            transform: scale(1.1);
        }

        /* Hộp quà xuất hiện */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .message-card {
            background: #1a1a1a;
            padding: 30px;
            border: 2px solid var(--pink-main);
            border-radius: 20px;
            max-width: 300px;
            text-align: center;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div class="main-content">
        <h1>Chào bạn xinh đẹp! ✨</h1>
        <div class="photo-space" id="photoSpace">
            </div>
        <button class="btn-gift" onclick="openGift()">Mở quà 🎁</button>
    </div>

    <div id="overlay" onclick="closeGift()">
        <div class="message-card">
            <h2 style="color: var(--pink-main)">Happy Women's Day!</h2>
            <p>Chúc "nửa thế giới" của tớ luôn rạng rỡ, hạnh phúc và gặp thật nhiều may mắn trong cuộc sống nhé! ❤️</p>
            <p style="font-size: 0.8rem; color: #888;">(Bấm bất kỳ đâu để đóng)</p>
        </div>
    </div>

    <script>
        // Hiệu ứng ngôi sao
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }

        // Tạo ảnh bay ngẫu nhiên
        function createPhotos() {
            const container = document.getElementById('photoSpace');
            // Thay link ảnh thật của bạn vào đây
            const links = [
                'https://picsum.photos/200/300?random=1',
                'https://picsum.photos/200/300?random=2',
                'https://picsum.photos/200/300?random=3'
            ];

            links.forEach((link, index) => {
                const img = document.createElement('img');
                img.src = link;
                img.className = 'floating-img';
                img.style.left = (20 + index * 25) + '%';
                img.style.top = (Math.random() * 30) + '%';
                img.style.animationDelay = index + 's';
                container.appendChild(img);
            });
        }

        // Logic mở quà
        function openGift() {
            document.getElementById('overlay').style.display = 'flex';
            console.log("Đã mở quà thành công!");
        }

        function closeGift() {
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => {
            initStars();
            draw();
            createPhotos();
        };

        window.onresize = initStars;
    </script>
</body>
</html>
