<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Đặc Biệt 8/3</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Màn hình bắt đầu */
        #start-screen {
            position: relative;
            z-index: 1000; /* Đảm bảo luôn nằm trên cùng để bấm được */
            text-align: center;
        }
        .btn-start {
            padding: 15px 35px;
            background: rgba(255, 182, 193, 0.2);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }
        .btn-start:hover {
            background: var(--pink-dark);
            transform: scale(1.05);
        }

        /* Chuỗi chữ */
        #text-sequence {
            display: none;
            position: relative;
            z-index: 500;
            font-size: 1.8rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 15px var(--pink-dark);
        }

        /* Hiệu ứng ảnh nền ngẫu nhiên */
        #photo-slider-bg {
            display: none; /* Sẽ chuyển thành flex bằng JS */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            overflow: hidden;
            justify-content: center;
            gap: 20px;
            opacity: 0.4;
        }

        .photo-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            will-change: transform;
        }

        @keyframes scrollDown {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0%); }
        }

        .slider-img {
            width: 200px; /* Ảnh to hơn */
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Nút Mở Quà */
        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
        }

        .btn-open-gift {
            padding: 20px 50px;
            background: var(--pink-dark);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.6rem;
            box-shadow: 0 0 40px var(--pink-dark);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Overlay cuối */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .gift-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--pink-dark);
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.3);
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from {opacity: 0; transform: scale(0.9);} to {opacity: 1; transform: scale(1);} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Bấm vào đây nè ✨</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-slider-bg"></div>

    <div id="main-content">
        <button class="btn-open-gift" onclick="showFinalGift()">Mở Quà Cho Cậu 🎁</button>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="gift-box">
            <h2 style="color: var(--pink-dark); margin-top: 0;">Happy Women's Day!</h2>
            <p style="line-height: 1.6;">Tớ hy vọng món quà nhỏ này làm cậu mỉm cười. Chúc cậu một ngày 8/3 thật ý nghĩa và trọn vẹn nhé! ❤️</p>
            <small style="opacity: 0.6;">(Bấm để đóng)</small>
        </div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ trước màn hình...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ chúc cậu luôn xinh đẹp, rạng rỡ",
            "Và luôn hạnh phúc với những gì mình chọn!",
            "Đây là một chút kỷ niệm dành cho cậu..."
        ];

        // Mảng ảnh (Bạn hãy thay link ảnh thật của bạn vào đây)
        const myImages = [
            'https://picsum.photos/400/600?random=1',
            'https://picsum.photos/400/600?random=2',
            'https://picsum.photos/400/600?random=3',
            'https://picsum.photos/400/600?random=4',
            'https://picsum.photos/400/600?random=5',
            'https://picsum.photos/400/600?random=6',
            'https://picsum.photos/400/600?random=7',
            'https://picsum.photos/400/600?random=8'
        ];

        let currentPhrase = 0;

        function startExperience() {
            // Ẩn màn hình bắt đầu
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';

                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 800);
                }, 2200);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            const bg = document.getElementById('photo-slider-bg');
            bg.style.display = 'flex'; // Hiện nền ảnh
            populateSlider();
            
            const main = document.getElementById('main-content');
            main.style.display = 'flex'; // Hiện nút mở quà
        }

        function populateSlider() {
            const container = document.getElementById('photo-slider-bg');
            container.innerHTML = ''; // Xóa trắng trước khi tạo
            
            // Tính số cột dựa trên chiều rộng màn hình (mỗi cột khoảng 220px cả gap)
            const columnCount = Math.ceil(window.innerWidth / 220) + 1;

            for (let i = 0; i < columnCount; i++) {
                const col = document.createElement('div');
                col.className = 'photo-column';
                
                // Tốc độ và độ trễ ngẫu nhiên cho từng cột
                const duration = 15 + Math.random() * 15; // Từ 15s đến 30s
                const delay = Math.random() * -20;
                col.style.animation = `scrollDown ${duration}s linear infinite`;
                col.style.animationDelay = `${delay}s`;

                // Trộn ảnh ngẫu nhiên cho mỗi cột để không bị trùng lặp hàng ngang
                const shuffled = [...myImages].sort(() => Math.random() - 0.5);
                // Nhân bản ảnh để tạo hiệu ứng trượt vô tận
                const combinedImages = [...shuffled, ...shuffled, ...shuffled];

                combinedImages.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'slider-img';
                    col.appendChild(img);
                });
                container.appendChild(col);
            }
        }

        function showFinalGift() {
            document.getElementById('overlay').style.display = 'flex';
        }

        // Canvas sao rơi
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 2,
                    v: 0.2 + Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.v;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
