<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Đặc Biệt 8/3</title>
    <style>
        :root {
            --pink-dark: #ff1493;
            --pink-light: #ffb6c1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        #start-screen {
            position: relative;
            z-index: 1000;
            text-align: center;
        }

        .btn-start {
            padding: 15px 35px;
            background: rgba(255, 182, 193, 0.2);
            border: 2px solid var(--pink-light);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        #text-sequence {
            display: none;
            position: relative;
            z-index: 500;
            font-size: 1.8rem;
            text-align: center;
            max-width: 80%;
            color: var(--pink-light);
            text-shadow: 0 0 15px var(--pink-dark);
        }

        /* --- HIỆU ỨNG ẢNH NGẪU NHIÊN --- */
        #photo-float-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none; /* Để không chặn click vào nút bấm */
        }

        .floating-img {
            position: absolute;
            width: 220px; /* Ảnh to */
            height: auto;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0.6;
            will-change: transform;
            /* Hiệu ứng trôi xuống */
            animation: floatDown linear infinite;
        }

        @keyframes floatDown {
            from { transform: translateY(-120vh) rotate(var(--rot)); }
            to { transform: translateY(120vh) rotate(var(--rot)); }
        }

        /* ------------------------------ */

        #main-content {
            display: none;
            position: relative;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
        }

        .btn-open-gift {
            padding: 20px 50px;
            background: var(--pink-dark);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.6rem;
            box-shadow: 0 0 40px var(--pink-dark);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .gift-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--pink-dark);
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="start-screen">
        <button class="btn-start" onclick="startExperience()">Bấm vào đây nè ✨</button>
    </div>

    <div id="text-sequence"></div>

    <div id="photo-float-container"></div>

    <div id="main-content">
        <button class="btn-open-gift" onclick="showFinalGift()">Mở Quà Cho Cậu 🎁</button>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="gift-box">
            <h2 style="color: var(--pink-dark)">Happy Women's Day!</h2>
            <p>Tớ hy vọng món quà nhỏ này làm cậu mỉm cười. Chúc cậu một ngày 8/3 thật ý nghĩa và trọn vẹn nhé! ❤️</p>
            <small>(Bấm để đóng)</small>
        </div>
    </div>

    <script>
        const phrases = [
            "Chào bạn nữ trước màn hình...",
            "Nhân ngày Quốc tế Phụ nữ 8/3",
            "Tớ chúc cậu luôn xinh đẹp, rạng rỡ",
            "Và luôn hạnh phúc với những gì mình chọn!",
            "Đây là một chút kỷ niệm dành cho cậu..."
        ];

        const myImages = [
            'https://picsum.photos/400/600?random=11',
            'https://picsum.photos/400/600?random=12',
            'https://picsum.photos/400/600?random=13',
            'https://picsum.photos/400/600?random=14',
            'https://picsum.photos/400/600?random=15',
            'https://picsum.photos/400/600?random=16',
            'https://picsum.photos/400/600?random=17',
            'https://picsum.photos/400/600?random=18'
        ];

        let currentPhrase = 0;

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            const textEl = document.getElementById('text-sequence');
            textEl.style.display = 'block';
            runTextSequence();
        }

        function runTextSequence() {
            const textEl = document.getElementById('text-sequence');
            if (currentPhrase < phrases.length) {
                textEl.innerText = phrases[currentPhrase];
                textEl.className = 'fade-in';
                setTimeout(() => {
                    textEl.className = 'fade-out';
                    setTimeout(() => {
                        currentPhrase++;
                        runTextSequence();
                    }, 800);
                }, 2200);
            } else {
                textEl.style.display = 'none';
                showMainContent();
            }
        }

        function showMainContent() {
            document.getElementById('photo-float-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'flex';
            createFloatingImages();
        }

        function createFloatingImages() {
            const container = document.getElementById('photo-float-container');
            const totalImages = 25; // Số lượng ảnh xuất hiện trên màn hình

            for (let i = 0; i < totalImages; i++) {
                const img = document.createElement('img');
                img.src = myImages[i % myImages.length];
                img.className = 'floating-img';
                
                // VỊ TRÍ NGẪU NHIÊN
                const leftPos = Math.random() * 90; // Từ 0% đến 90% chiều rộng
                const duration = 15 + Math.random() * 20; // Tốc độ rơi từ 15s đến 35s
                const delay = Math.random() * -40; // Độ trễ âm để ảnh đã rơi sẵn khi vừa hiện
                const rotation = (Math.random() - 0.5) * 30; // Xoay nhẹ ảnh từ -15 đến 15 độ
                const zIndex = Math.floor(Math.random() * 10); // Độ ưu tiên chồng lớp ngẫu nhiên
                const scale = 0.8 + Math.random() * 0.5; // Kích thước ảnh to nhỏ khác nhau

                img.style.left = `${leftPos}%`;
                img.style.animationDuration = `${duration}s`;
                img.style.animationDelay = `${delay}s`;
                img.style.zIndex = zIndex;
                img.style.setProperty('--rot', `${rotation}deg`);
                img.style.width = `${200 * scale}px`;

                container.appendChild(img);
            }
        }

        function showFinalGift() {
            document.getElementById('overlay').style.display = 'flex';
        }

        // Sao rơi nền
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: 0.3});
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
