<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Nhỏ - 8/3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Arial', sans-serif;
            color: #ff69b4;
        }

        /* Hiệu ứng nền sao rơi */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493; }
            to { text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff69b4; }
        }

        /* Gallery ảnh bay lơ lửng */
        .gallery {
            position: relative;
            width: 300px;
            height: 300px;
            perspective: 1000px;
            margin-top: 20px;
        }

        .img-card {
            position: absolute;
            width: 80px;
            height: 100px;
            border: 2px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            background-size: cover;
            background-position: center;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Nút mở lời chúc */
        .btn-open {
            margin-top: 50px;
            padding: 10px 25px;
            background: rgba(255, 20, 147, 0.2);
            border: 2px solid #ff1493;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-open:hover {
            background: #ff1493;
            box-shadow: 0 0 20px #ff1493;
        }

        /* Modal lời chúc */
        #messageBox {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 1px solid #ff69b4;
            border-radius: 15px;
            z-index: 100;
            width: 80%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="container">
        <h1>Chúc Mừng Ngày Quốc Tế Phụ Nữ</h1>
        <h2 style="color: #fff;">8 Tháng 3</h2>

        <div class="gallery" id="imageContainer">
            </div>

        <button class="btn-open" onclick="showMessage()">Mở Quà 🎁</button>
    </div>

    <div id="messageBox">
        <h3>Gửi người thương!</h3>
        <p>Chúc bạn luôn xinh đẹp, rạng rỡ như những đóa hoa. Cảm ơn vì đã là một phần tuyệt vời của thế giới này! ❤️</p>
        <button onclick="document.getElementById('messageBox').style.display='none'" style="color: pink; background: none; border: none; cursor: pointer;">Đóng</button>
    </div>

    <script>
        // Tạo nền sao rơi
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // Tạo ảnh bay lơ lửng (Thay link ảnh của bạn vào đây)
        const imageUrls = [
            'https://via.placeholder.com/80x100?text=Pic1',
            'https://via.placeholder.com/80x100?text=Pic2',
            'https://via.placeholder.com/80x100?text=Pic3',
            'https://via.placeholder.com/80x100?text=Pic4'
        ];

        const container = document.getElementById('imageContainer');
        imageUrls.forEach((url, i) => {
            const img = document.createElement('div');
            img.className = 'img-card';
            img.style.backgroundImage = url('${url}');
            img.style.left = ${Math.random() * 200}px;
            img.style.top = ${Math.random() * 200}px;
            img.style.animationDelay = ${i * 0.5}s;
            container.appendChild(img);
        });

        function showMessage() {
            document.getElementById('messageBox').style.display = 'block';
        }
    </script>
</body>
</html>
